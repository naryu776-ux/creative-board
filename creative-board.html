<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Board</title>
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Creative Board">
<meta name="theme-color" content="#1A1A2E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F7F5F2; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; }
input,textarea,button { font-family: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes bounceFast { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes celebrate { 0%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-14px) rotate(-10deg)} 75%{transform:translateY(-10px) rotate(10deg)} 100%{transform:translateY(0) rotate(0)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes starPop { 0%{opacity:0;transform:scale(0)} 60%{opacity:1;transform:scale(1.2)} 100%{opacity:1;transform:scale(1)} }
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes tickerSlide { 0%{opacity:0;transform:translateX(60px)} 10%{opacity:1;transform:translateX(0)} 85%{opacity:1;transform:translateX(0)} 100%{opacity:0;transform:translateX(-40px)} }
@keyframes ticker { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NUDGES = [
  { icon:"✏️", text:"今日、5分だけスケッチしてみよう" },
  { icon:"👀", text:"好きなイラストレーターの最新作、チェックしてみた？" },
  { icon:"🚶", text:"外に出て人間観察の時間、取れそう？" },
  { icon:"💬", text:"クリエイター仲間と最近交流した？" },
  { icon:"🎨", text:"気になってたギャラリーやオンライン展示、見てみよう" },
  { icon:"📱", text:"参考になりそうなアカウント、新しくフォローしてみよう" },
  { icon:"🎬", text:"インスピレーションになりそうな映画や動画、見た？" },
  { icon:"📖", text:"積読になってる本、少しだけ読んでみよう" },
];

const PROJECT_EMOJIS = [
  "🎨","✏️","🖌️","📐","🎭","🎬","🎵","🎤","📸","🖥️",
  "🌸","🌿","🍄","⭐","🔥","💫","🌙","🌈","🦋","🐾",
  "💎","🏆","📦","📋","🗂️","💡","🔮","🎯","🚀","⚡",
];

const mkTask = (id, label, done=false) => ({
  id, label, done,
  reminders: { start:"", end:"" },
  firedStart: false, firedEnd: false,
  pendingDelete: false,
});

const INITIAL_PROJECTS = [
  {
    id:1, title:"ここにプロジェクト名を記入", emoji:"🎨", tags:[],
    deadline: new Date(Date.now() + 7*86400000), color:"#FF6B6B",
    tasks: [mkTask(1,"タスク1"), mkTask(2,"タスク2"), mkTask(3,"タスク3"), mkTask(4,"タスク4")],
    memos: [],
  },
];

const INITIAL_PROMOTION = [
  { id:1, label:"SNSに制作過程を投稿", done:false, due:"今日" },
  { id:2, label:"完成作品を投稿", done:false, due:"今週" },
];

const INITIAL_OPERATIONS = [
  { id:1, label:"ページ分析（アクセス・CVR確認）", done:false, repeat:"monthly", notify:"", lastDone:null },
  { id:2, label:"商品ページの改善・更新", done:false, repeat:"monthly", notify:"", lastDone:null },
  { id:3, label:"売上・収支確認", done:false, repeat:"monthly", notify:"", lastDone:null },
  { id:4, label:"SNSアカウント分析", done:false, repeat:"weekly", notify:"", lastDone:null },
];

const INITIAL_LINKS = [
  { id:1, label:"X (Twitter)", url:"https://x.com", color:"#1A1A1A", icon:"𝕏" },
  { id:2, label:"Instagram", url:"https://www.instagram.com", color:"#E1306C", icon:"📷" },
];

const getDaysLeft = (d) => Math.ceil((new Date(d) - new Date()) / 86400000);
const getUrgency = (days) => {
  if (days <= 3) return { bg:"#FFF0F0", accent:"#FF4444", label:"緊急" };
  if (days <= 7) return { bg:"#FFFBF0", accent:"#FF9500", label:"注意" };
  return { bg:"#F0FFF8", accent:"#00C96B", label:"余裕" };
};
const getProgress = (tasks) => {
  if (!tasks.length) return 0;
  return Math.round((tasks.filter(t=>t.done).length / tasks.length) * 100);
};
const fmtDt = (iso) => {
  if (!iso) return "";
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
};
const fmtDate = (d) => {
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,"0")}/${String(dt.getDate()).padStart(2,"0")}`;
};
const toDateInput = (d) => {
  const dt = new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
};

const fmtDue = (due) => {
  if (!due) return "";
  if (/^\d{4}-\d{2}-\d{2}/.test(due)) {
    const d = new Date(due);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }
  return due;
};

const Bell = ({ active, color }) => (
  <svg width="15" height="15" viewBox="0 0 24 24"
    fill={active ? color : "none"} stroke={active ? color : "#ccc"}
    strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
  </svg>
);

const EmojiChar = ({ pct, emoji }) => {
  const state = pct===0?"sleep":pct<=25?"idle":pct<=60?"work":pct<=89?"hype":pct<100?"almost":"done";
  const [frame, setFrame] = useState(0);
  useEffect(() => {
    const speed = {sleep:2000,idle:800,work:500,hype:250,almost:150,done:200}[state];
    const id = setInterval(() => setFrame(f => f===0?1:0), speed);
    return () => clearInterval(id);
  }, [state]);

  const transforms = {
    sleep:  ["translateY(0px)","translateY(-2px)"],
    idle:   ["translateY(0px)","translateY(-5px)"],
    work:   ["translateY(0px)","translateY(-7px)"],
    hype:   ["translateY(0px) rotate(-8deg)","translateY(-10px) rotate(8deg)"],
    almost: ["translateY(0px) rotate(-12deg)","translateY(-12px) rotate(12deg)"],
    done:   ["translateY(0px) scale(1)","translateY(-8px) scale(1.15)"],
  }[state];

  const msg = {
    sleep:"まだ始まってないよ〜", idle:"ゆっくり始めよう", work:"いい感じ！",
    hype:"どんどん来てる！", almost:"あと少し！", done:"完了！🎉",
  }[state];

  const bgColor = {
    sleep:"#F0F0F0", idle:"#E8F5E9", work:"#E3F2FD",
    hype:"#FFF3E0", almost:"#FBE9E7", done:"#F3E5F5",
  }[state];

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:44}}>
      <div style={{position:"relative"}}>
        {state==="done" && <div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",fontSize:9,whiteSpace:"nowrap",animation:"starPop 0.4s ease both"}}>✨✨</div>}
        {state==="almost" && <div style={{position:"absolute",top:-4,right:-8,fontSize:10,animation:"float 0.8s ease-in-out infinite"}}>💦</div>}
        <div style={{width:36,height:36,borderRadius:10,background:bgColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,transform:transforms[frame],transition:"transform 0.15s ease"}}>
          {emoji}
        </div>
      </div>
      <div style={{fontSize:7,color:"#aaa",textAlign:"center",lineHeight:1.3,maxWidth:44}}>{msg}</div>
    </div>
  );
};

function App() {
  const loadState = (key, fallback) => {
    try {
      const saved = localStorage.getItem(key);
      if (!saved) return fallback;
      const parsed = JSON.parse(saved);
      if (key === "cb_projects") return parsed.map(p => ({
        tags: p.tags || (p.client ? [p.client] : []),
        ...p,
        deadline: new Date(p.deadline),
        startDate: p.startDate ? new Date(p.startDate) : null,
        tasks: (p.tasks||[]).map(t => ({...t, pendingDelete:false})),
      }));
      return parsed;
    } catch { return fallback; }
  };

  const [projects, setProjects] = useState(() => loadState("cb_projects", INITIAL_PROJECTS));
  const [promotion, setPromotion] = useState(() => loadState("cb_promotion", INITIAL_PROMOTION));
  const [operations, setOperations] = useState(() => loadState("cb_operations", INITIAL_OPERATIONS));
  const [myLinks, setMyLinks] = useState(() => loadState("cb_links", INITIAL_LINKS));
  const [headerColor, setHeaderColor] = useState(() => localStorage.getItem("cb_headerColor") || "#1A1A2E");

  const [expandedId, setExpandedId] = useState(null);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [showColorPicker, setShowColorPicker] = useState(false);
  const [nudge, setNudge] = useState(NUDGES[0]);
  const [nudgeVisible, setNudgeVisible] = useState(true);
  const [tickerNudge, setTickerNudge] = useState(NUDGES[0]);
  const [tickerKey, setTickerKey] = useState(0);
  const [notifPerm, setNotifPerm] = useState("default");
  const [toasts, setToasts] = useState([]);
  const [undoStack, setUndoStack] = useState([]);

  const [showAdd, setShowAdd] = useState(false);
  const [newP, setNewP] = useState({title:"",client:"",startDate:"",endDate:"",emoji:"🎨",tags:[]});
  const [tagInput, setTagInput] = useState("");
  const [cardTagInputs, setCardTagInputs] = useState({});
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [editProjectId, setEditProjectId] = useState(null);
  const [editProjectTitle, setEditProjectTitle] = useState("");
  const [editDeadlineVal, setEditDeadlineVal] = useState("");

  const [openReminder, setOpenReminder] = useState(null);
  const [taskInputs, setTaskInputs] = useState({});
  const [editTaskId, setEditTaskId] = useState(null);
  const [editTaskLabel, setEditTaskLabel] = useState("");

  const [memoInputs, setMemoInputs] = useState({});

  const [showAddPromotion, setShowAddPromotion] = useState(false);
  const [newPromotion, setNewPromotion] = useState({label:"",due:"今日"});
  const [editPromotion, setEditPromotion] = useState(null);

  const [showAddOp, setShowAddOp] = useState(false);
  const [newOp, setNewOp] = useState({label:"",repeat:"none",notify:""});
  const [editOpId, setEditOpId] = useState(null);

  const [showAddLink, setShowAddLink] = useState(false);
  const [newLink, setNewLink] = useState({label:"",url:"",icon:"🔗",color:"#888"});

  const [kanbanCol, setKanbanCol] = useState("section");

  const toastTimers = useRef({});

  const headerTextColor = (() => {
    try {
      const hex = headerColor.replace("#","");
      const r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
      return (0.299*r+0.587*g+0.114*b)/255 > 0.5 ? "#1A1A2E" : "#ffffff";
    } catch { return "#ffffff"; }
  })();
  const headerSubColor = headerTextColor==="#1A1A2E" ? "rgba(0,0,0,0.4)" : "rgba(255,255,255,0.5)";

  useEffect(() => {
    setNudge(NUDGES[Math.floor(Math.random()*NUDGES.length)]);
    setTickerNudge(NUDGES[Math.floor(Math.random()*NUDGES.length)]);
    if ("Notification" in window) setNotifPerm(Notification.permission);
    const tickerId = setInterval(() => {
      setTickerNudge(NUDGES[Math.floor(Math.random()*NUDGES.length)]);
      setTickerKey(k => k+1);
    }, 8000);
    return () => clearInterval(tickerId);
  }, []);

  useEffect(() => {
    const id = setInterval(() => {
      const now = new Date();
      setProjects(prev => prev.map(p => ({
        ...p,
        tasks: p.tasks.map(t => {
          let u = {...t};
          if (t.reminders.start && !t.firedStart && now >= new Date(t.reminders.start)) {
            fireNotif(`「${t.label}」取り掛かり時刻です`, p.title);
            toast(`🔔 「${t.label}」取り掛かり時刻！`);
            u.firedStart = true;
          }
          if (t.reminders.end && !t.firedEnd && now >= new Date(t.reminders.end)) {
            fireNotif(`「${t.label}」終了予定時刻です`, p.title);
            toast(`⏰ 「${t.label}」終了予定時刻！`);
            u.firedEnd = true;
          }
          return u;
        })
      })));
    }, 30000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => { try { localStorage.setItem("cb_projects", JSON.stringify(projects)); } catch {} }, [projects]);
  useEffect(() => { try { localStorage.setItem("cb_promotion", JSON.stringify(promotion)); } catch {} }, [promotion]);
  useEffect(() => { try { localStorage.setItem("cb_operations", JSON.stringify(operations)); } catch {} }, [operations]);
  useEffect(() => { try { localStorage.setItem("cb_links", JSON.stringify(myLinks)); } catch {} }, [myLinks]);
  useEffect(() => { try { localStorage.setItem("cb_headerColor", headerColor); } catch {} }, [headerColor]);

  const fireNotif = (body, title) => {
    if ("Notification" in window && Notification.permission==="granted")
      new Notification("Creative Board", { body:`${title}：${body}` });
  };
  const toast = (msg) => {
    const id = Date.now();
    setToasts(p => [...p, {id, msg}]);
    toastTimers.current[id] = setTimeout(() => setToasts(p => p.filter(t => t.id!==id)), 4000);
  };
  const requestNotif = async () => {
    const r = await Notification.requestPermission();
    setNotifPerm(r);
    if (r==="granted") toast("✅ 通知が許可されました");
  };

  const updateReminder = (pid,tid,key,val) => setProjects(prev => prev.map(p => p.id!==pid?p:{...p,tasks:p.tasks.map(t=>t.id!==tid?t:{...t,reminders:{...t.reminders,[key]:val},firedStart:key==="start"?false:t.firedStart,firedEnd:key==="end"?false:t.firedEnd})}));
  const clearReminders = (pid,tid) => setProjects(prev => prev.map(p => p.id!==pid?p:{...p,tasks:p.tasks.map(t=>t.id!==tid?t:{...t,reminders:{start:"",end:""},firedStart:false,firedEnd:false})}));

  const toggleTask = (pid,tid) => setProjects(prev => prev.map(p => p.id!==pid?p:{...p,tasks:p.tasks.map(t=>t.id!==tid?t:{...t,done:!t.done})}));
  const addTask = (pid,label) => {
    if (!label.trim()) return;
    setProjects(prev => prev.map(p => p.id!==pid?p:{...p,tasks:[...p.tasks,mkTask(Date.now(),label.trim())]}));
  };
  const deleteTask = (pid,tid) => {
    setProjects(prev => {
      const project = prev.find(p=>p.id===pid);
      const task = project.tasks.find(t=>t.id===tid);
      const undoId = Date.now();
      const timer = setTimeout(() => {
        setUndoStack(p=>p.filter(u=>u.id!==undoId));
        setProjects(pp=>pp.map(p=>p.id!==pid?p:{...p,tasks:p.tasks.filter(t=>t.id!==tid)}));
      }, 5000);
      setUndoStack(p=>[...p,{id:undoId,pid,tid,timer}]);
      return prev.map(p=>p.id!==pid?p:{...p,tasks:p.tasks.map(t=>t.id!==tid?t:{...t,pendingDelete:true})});
    });
  };
  const undoDeleteTask = (pid,tid) => {
    const item = undoStack.find(u=>u.pid===pid&&u.tid===tid);
    if (item) clearTimeout(item.timer);
    setUndoStack(p=>p.filter(u=>!(u.pid===pid&&u.tid===tid)));
    setProjects(prev=>prev.map(p=>p.id!==pid?p:{...p,tasks:p.tasks.map(t=>t.id!==tid?t:{...t,pendingDelete:false})}));
  };
  const updateTaskLabel = (pid,tid,label) => {
    if (!label.trim()) return;
    setProjects(prev=>prev.map(p=>p.id!==pid?p:{...p,tasks:p.tasks.map(t=>t.id!==tid?t:{...t,label:label.trim()})}));
    setEditTaskId(null); setEditTaskLabel("");
  };
  const updateProjectInfo = (pid, title, deadlineStr) => {
    if (!title.trim()) return;
    setProjects(prev => prev.map(p => p.id!==pid ? p : {
      ...p,
      title: title.trim(),
      deadline: deadlineStr ? new Date(deadlineStr) : p.deadline,
    }));
    setEditProjectId(null);
    setEditProjectTitle("");
    setEditDeadlineVal("");
  };
  const deleteProject = (pid) => {
    setProjects(prev=>prev.filter(p=>p.id!==pid));
    if (expandedId===pid) setExpandedId(null);
    toast("🗑 案件を削除しました");
  };
  const addProject = () => {
    if (!newP.title || !newP.endDate) return;
    setProjects(prev=>[...prev,{
      id:Date.now(), title:newP.title, emoji:newP.emoji||"🎨", tags:newP.tags||[],
      deadline:new Date(newP.endDate),
      startDate:newP.startDate?new Date(newP.startDate):null,
      color:["#FF6B6B","#4ECDC4","#A29BFE","#FFD93D","#F8A5C2"][Math.floor(Math.random()*5)],
      tasks:[mkTask(1,"タスク1")], memos:[],
    }]);
    setNewP({title:"",client:"",startDate:"",endDate:"",emoji:"🎨",tags:[]});
    setTagInput("");
    setShowAdd(false);
  };

  const addTag = (pid, tag) => {
    if (!tag.trim()) return;
    setProjects(prev => prev.map(p => p.id!==pid ? p : {...p, tags:[...(p.tags||[]), tag.trim()]}));
    setCardTagInputs(prev => ({...prev, [pid]:""}));
  };
  const removeTag = (pid, idx) => {
    setProjects(prev => prev.map(p => p.id!==pid ? p : {...p, tags:(p.tags||[]).filter((_,i)=>i!==idx)}));
  };

  const addMemo = (pid) => {
    const text = (memoInputs[pid]||"").trim();
    if (!text) return;
    const d = new Date();
    const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
    setProjects(prev=>prev.map(p=>p.id!==pid?p:{...p,memos:[{id:Date.now(),text,date:dateStr},...p.memos]}));
    setMemoInputs(prev=>({...prev,[pid]:""}));
  };
  const deleteMemo = (pid,mid) => setProjects(prev=>prev.map(p=>p.id!==pid?p:{...p,memos:p.memos.filter(m=>m.id!==mid)}));

  const addPromotionTask = (label,due) => {
    if (!label.trim()) return;
    setPromotion(prev=>[...prev,{id:Date.now(),label:label.trim(),done:false,due:due||"今週"}]);
  };
  const deletePromotionTask = (id) => setPromotion(prev=>prev.filter(t=>t.id!==id));
  const updatePromotionTask = (id,label,due) => {
    setPromotion(prev=>prev.map(t=>t.id!==id?t:{...t,label,due}));
    setEditPromotion(null);
  };

  const toggleOperation = (id) => setOperations(prev=>prev.map(t=>t.id!==id?t:{...t,done:!t.done,lastDone:!t.done?new Date().toISOString():t.lastDone}));
  const addOperation = () => {
    if (!newOp.label.trim()) return;
    setOperations(prev=>[...prev,{id:Date.now(),label:newOp.label.trim(),done:false,repeat:newOp.repeat,notify:newOp.notify,lastDone:null}]);
    setNewOp({label:"",repeat:"none",notify:""}); setShowAddOp(false);
  };
  const deleteOperation = (id) => setOperations(prev=>prev.filter(t=>t.id!==id));

  const today = new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"});
  const urgentCount = projects.filter(p=>getDaysLeft(p.deadline)<=3).length;

  const S = {
    wrap: { minHeight:"100vh", background:"#F7F5F2", maxWidth:430, margin:"0 auto" },
    toastWrap: { position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", zIndex:999, width:"90%", maxWidth:380 },
    toast: { background:"#1A1A2E", color:"#fff", borderRadius:12, padding:"12px 16px", marginBottom:8, fontSize:13, fontWeight:600, boxShadow:"0 4px 20px rgba(0,0,0,0.25)", animation:"slideDown 0.3s ease" },
    header: { background:headerColor, padding:"20px 20px 16px", position:"sticky", top:0, zIndex:100 },
    tab: (active) => ({ flex:1, padding:"7px 0", borderRadius:8, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, transition:"all 0.2s", background:active?"#fff":"transparent", color:active?"#1A1A2E":headerSubColor }),
    card: (urgent) => ({ background:"#fff", borderRadius:10, marginBottom:5, overflow:"hidden", boxShadow:"0 1px 6px rgba(0,0,0,0.06)", border:urgent?"1.5px solid #FF4444":"1.5px solid transparent" }),
    notifBanner: { background:"#FFF8E7", border:"1.5px solid #FFD93D", borderRadius:12, padding:"10px 14px", marginBottom:12, display:"flex", alignItems:"center", justifyContent:"space-between" },
    input: { width:"100%", padding:"9px 10px", borderRadius:8, border:"1.5px solid #E0E0E0", fontSize:12, outline:"none", boxSizing:"border-box" },
    footer: { position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:"rgba(247,245,242,0.95)", backdropFilter:"blur(10px)", borderTop:"1px solid #EEE", padding:"10px 16px 20px", textAlign:"center", fontSize:10, color:"#CCC" },
  };

  const renderCard = (project) => {
    const days = getDaysLeft(project.deadline);
    const urgency = getUrgency(days);
    const progress = getProgress(project.tasks);
    const isExpanded = expandedId === project.id;
    const rKey = (tid) => `${project.id}-${tid}`;

    return (
      <div key={project.id} style={S.card(days<=3)}>
        <div onClick={() => setExpandedId(isExpanded?null:project.id)} style={{padding:"10px 12px",cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,flex:1}}>
              <div style={{flexShrink:0}}>
                <EmojiChar pct={progress} emoji={project.emoji||"🎨"} />
              </div>
              <div style={{flex:1,paddingTop:4}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:project.color,flexShrink:0}} />
                  {editProjectId===project.id ? (
                    <div onClick={e=>e.stopPropagation()} style={{flex:1}}>
                      <input type="text" value={editProjectTitle} onChange={e=>setEditProjectTitle(e.target.value)}
                        onKeyDown={e=>{e.stopPropagation();if(e.key==="Escape"){setEditProjectId(null);setEditProjectTitle("");setEditDeadlineVal("");}}}
                        autoFocus style={{width:"100%",padding:"4px 8px",borderRadius:6,border:`1.5px solid ${project.color}`,fontSize:13,outline:"none",fontWeight:700,boxSizing:"border-box",marginBottom:5}}/>
                      <div style={{display:"flex",gap:5,alignItems:"center"}}>
                        <span style={{fontSize:10,color:"#999",whiteSpace:"nowrap"}}>期限</span>
                        <input type="date" value={editDeadlineVal} onChange={e=>setEditDeadlineVal(e.target.value)}
                          style={{flex:1,padding:"3px 6px",borderRadius:6,border:"1.5px solid #EEE",fontSize:11,outline:"none"}}/>
                        <button onClick={()=>updateProjectInfo(project.id,editProjectTitle,editDeadlineVal)} style={{padding:"4px 8px",borderRadius:6,border:"none",background:project.color,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>保存</button>
                        <button onClick={e=>{e.stopPropagation();setEditProjectId(null);setEditProjectTitle("");setEditDeadlineVal("");}} style={{padding:"4px 6px",borderRadius:6,border:"1.5px solid #EEE",background:"#fff",color:"#999",fontSize:11,cursor:"pointer"}}>✕</button>
                      </div>
                    </div>
                  ) : (
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#1A1A2E",lineHeight:1.3}}>{project.title}</div>
                      <button onClick={e=>{e.stopPropagation();setEditProjectId(project.id);setEditProjectTitle(project.title);setEditDeadlineVal(toDateInput(project.deadline));}} style={{background:"none",border:"none",color:"#ccc",fontSize:12,cursor:"pointer",padding:0}}>✏️</button>
                    </div>
                  )}
                </div>
                <div style={{display:"flex",gap:3,flexWrap:"wrap",marginLeft:12,marginTop:1}}>
                  {(project.tags||[]).map((tag,i)=>(
                    <span key={i} style={{fontSize:8,padding:"1px 5px",borderRadius:4,background:["#FF6B6B22","#4ECDC422","#A29BFE22","#FFD93D22","#F8A5C222","#74B9FF22"][i%6],color:["#FF6B6B","#4ECDC4","#A29BFE","#CC9900","#D4608A","#2980B9"][i%6],fontWeight:600,whiteSpace:"nowrap"}}>{tag}</span>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{flex:1,height:3,background:"#F0F0F0",borderRadius:10,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${progress}%`,background:project.color,borderRadius:10,transition:"width 0.4s ease"}} />
                </div>
                <div style={{fontSize:8,fontWeight:700,color:project.color,flexShrink:0}}>{progress}%</div>
              </div>
            </div>
            <div style={{flexShrink:0,textAlign:"right"}}>
              <div style={{background:urgency.bg,color:urgency.accent,borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>
                {days<=0?"超過!":`残り${days}日`}
              </div>
              <div style={{fontSize:8,color:"#bbb",marginTop:1}}>{fmtDate(project.deadline)}</div>
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",marginTop:2}}>
            <div style={{fontSize:8,color:"#ccc"}}>{isExpanded?"▲ 閉じる":"▼ 開く"}</div>
          </div>
        </div>

        {isExpanded && (
          <div style={{borderTop:"1px solid #F5F5F5",background:"#FAFAFA"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px 0"}}>
              {confirmDeleteId===project.id ? (
                <div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:10,color:"#FF4444"}}>本当に削除？</span>
                  <button onClick={e=>{e.stopPropagation();deleteProject(project.id);setConfirmDeleteId(null);}} style={{background:"#FF4444",border:"none",borderRadius:6,padding:"3px 8px",color:"#fff",fontSize:10,cursor:"pointer"}}>削除</button>
                  <button onClick={e=>{e.stopPropagation();setConfirmDeleteId(null);}} style={{background:"#EEE",border:"none",borderRadius:6,padding:"3px 8px",color:"#999",fontSize:10,cursor:"pointer"}}>キャンセル</button>
                </div>
              ) : (
                <button onClick={e=>{e.stopPropagation();setConfirmDeleteId(project.id);}} style={{background:"none",border:"none",color:"#ddd",fontSize:10,cursor:"pointer",padding:0}}>🗑 削除</button>
              )}
            </div>
            {/* タグ編集 */}
            <div style={{padding:"8px 12px 4px",borderBottom:"1px solid #F0F0F0"}}>
              <div style={{fontSize:10,color:"#bbb",marginBottom:5,letterSpacing:0.5}}>タグ</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:5}}>
                {(project.tags||[]).map((tag,i)=>(
                  <span key={i} style={{fontSize:10,padding:"2px 7px",borderRadius:6,background:["#FF6B6B22","#4ECDC422","#A29BFE22","#FFD93D22","#F8A5C222","#74B9FF22"][i%6],color:["#FF6B6B","#4ECDC4","#A29BFE","#CC9900","#D4608A","#2980B9"][i%6],fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                    {tag}
                    <span onClick={()=>removeTag(project.id,i)} style={{cursor:"pointer",opacity:0.5,fontSize:11}}>×</span>
                  </span>
                ))}
              </div>
              <div style={{display:"flex",gap:5}}>
                <input type="text" placeholder="タグを追加…" value={cardTagInputs[project.id]||""}
                  onChange={e=>setCardTagInputs(p=>({...p,[project.id]:e.target.value}))}
                  onKeyDown={e=>{e.stopPropagation();if(e.key==="Enter"&&(cardTagInputs[project.id]||"").trim()){addTag(project.id,cardTagInputs[project.id]);}}}
                  style={{flex:1,padding:"5px 8px",borderRadius:7,border:"1.5px solid #E8E8E8",fontSize:11,outline:"none"}}/>
                <button onClick={()=>addTag(project.id,cardTagInputs[project.id]||"")}
                  style={{padding:"5px 10px",borderRadius:7,border:"none",background:project.color,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>＋</button>
              </div>
            </div>

            <div style={{padding:"8px 12px 8px"}}>
              <div style={{fontSize:10,color:"#bbb",marginBottom:6,letterSpacing:0.5}}>タスク</div>
              {project.tasks.map(task => {
                const isROpen = openReminder===rKey(task.id);
                const hasR = task.reminders.start||task.reminders.end;
                return (
                  <div key={task.id}>
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F0F0F0"}}>
                      <div onClick={()=>!task.pendingDelete&&toggleTask(project.id,task.id)}
                        style={{width:20,height:20,borderRadius:6,flexShrink:0,cursor:"pointer",border:task.done?"none":`2px solid ${project.color}`,background:task.done?project.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                        {task.done&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
                      </div>
                      <div style={{flex:1}}>
                        {editTaskId===rKey(task.id) ? (
                          <div style={{display:"flex",gap:5}}>
                            <input type="text" value={editTaskLabel} onChange={e=>setEditTaskLabel(e.target.value)}
                              onKeyDown={e=>{e.stopPropagation();if(e.key==="Enter")updateTaskLabel(project.id,task.id,editTaskLabel);if(e.key==="Escape"){setEditTaskId(null);setEditTaskLabel("");}}}
                              autoFocus style={{flex:1,padding:"4px 8px",borderRadius:6,border:`1.5px solid ${project.color}`,fontSize:12,outline:"none"}}/>
                            <button onClick={()=>updateTaskLabel(project.id,task.id,editTaskLabel)} style={{padding:"4px 10px",borderRadius:6,border:"none",background:project.color,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>保存</button>
                            <button onClick={()=>{setEditTaskId(null);setEditTaskLabel("");}} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #EEE",background:"#fff",color:"#999",fontSize:11,cursor:"pointer"}}>✕</button>
                          </div>
                        ) : (
                          <div onClick={()=>!task.pendingDelete&&toggleTask(project.id,task.id)} style={{cursor:"pointer"}}>
                            <span style={{fontSize:13,color:task.pendingDelete?"#ccc":task.done?"#bbb":"#333",textDecoration:task.pendingDelete||task.done?"line-through":"none"}}>{task.label}</span>
                            {hasR&&!task.pendingDelete&&(
                              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>
                                {task.reminders.start&&<span style={{fontSize:9,color:"#4ECDC4",background:"#F0FFFD",borderRadius:4,padding:"1px 5px"}}>▶ {fmtDt(task.reminders.start)}</span>}
                                {task.reminders.end&&<span style={{fontSize:9,color:"#FF9500",background:"#FFFBF0",borderRadius:4,padding:"1px 5px"}}>■ {fmtDt(task.reminders.end)}</span>}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                      {task.pendingDelete ? (
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={()=>undoDeleteTask(project.id,task.id)} style={{background:"#FF4444",border:"none",borderRadius:8,padding:"4px 10px",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>キャンセル</button>
                          <button onClick={()=>{const item=undoStack.find(u=>u.pid===project.id&&u.tid===task.id);if(item)clearTimeout(item.timer);setUndoStack(p=>p.filter(u=>!(u.pid===project.id&&u.tid===task.id)));setProjects(p=>p.map(pp=>pp.id!==project.id?pp:{...pp,tasks:pp.tasks.filter(t=>t.id!==task.id)}));}} style={{background:"#EEE",border:"none",borderRadius:8,padding:"4px 10px",color:"#999",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>削除</button>
                        </div>
                      ) : (
                        <>
                          <button onClick={()=>{setEditTaskId(rKey(task.id));setEditTaskLabel(task.label);}} style={{background:"none",border:"none",color:"#ccc",fontSize:13,cursor:"pointer",padding:"0 2px"}}>✏️</button>
                          <button onClick={()=>setOpenReminder(isROpen?null:rKey(task.id))} style={{background:isROpen?"#F0F0F0":"transparent",border:"none",borderRadius:8,padding:"5px 6px",cursor:"pointer",display:"flex",alignItems:"center"}}>
                            <Bell active={!!hasR} color={project.color}/>
                          </button>
                          <button onClick={()=>deleteTask(project.id,task.id)} style={{background:"none",border:"none",color:"#ddd",fontSize:15,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button>
                        </>
                      )}
                    </div>
                    {isROpen&&(
                      <div style={{background:"#fff",borderRadius:12,margin:"6px 0 8px",padding:14,border:`1.5px solid ${project.color}33`,boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:12}}>🔔 リマインド設定 — {task.label}</div>
                        {[{key:"start",label:"取り掛かり",color:"#4ECDC4"},{key:"end",label:"終了（締め切り）",color:"#FF9500"}].map(r=>(
                          <div key={r.key} style={{marginBottom:12}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                              <div style={{width:8,height:8,borderRadius:"50%",background:r.color}}/>
                              <div style={{fontSize:11,color:"#555",fontWeight:600}}>{r.label}</div>
                            </div>
                            <input type="datetime-local" value={task.reminders[r.key]} onChange={e=>updateReminder(project.id,task.id,r.key,e.target.value)}
                              style={{width:"100%",padding:"9px 10px",borderRadius:8,border:`1.5px solid ${task.reminders[r.key]?r.color+"66":"#E0E0E0"}`,fontSize:12,outline:"none",boxSizing:"border-box"}}/>
                          </div>
                        ))}
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>{clearReminders(project.id,task.id);setOpenReminder(null);}} style={{flex:1,padding:"8px",borderRadius:8,border:"1.5px solid #EEE",background:"#fff",color:"#bbb",fontSize:11,cursor:"pointer"}}>クリア</button>
                          <button onClick={()=>{setOpenReminder(null);toast("🔔 リマインドを設定しました");}} style={{flex:2,padding:"8px",borderRadius:8,border:"none",background:project.color,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>保存して閉じる</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{display:"flex",gap:6,marginTop:8}}>
                <input type="text" placeholder="タスクを追加…" value={taskInputs[project.id]||""}
                  onChange={e=>setTaskInputs(p=>({...p,[project.id]:e.target.value}))}
                  onKeyDown={e=>{e.stopPropagation();if(e.key==="Enter"){addTask(project.id,taskInputs[project.id]||"");setTaskInputs(p=>({...p,[project.id]:""}));}}}
                  style={{flex:1,padding:"7px 10px",borderRadius:8,border:"1.5px solid #E8E8E8",fontSize:12,outline:"none"}}/>
                <button onClick={()=>{addTask(project.id,taskInputs[project.id]||"");setTaskInputs(p=>({...p,[project.id]:""}));}} style={{padding:"7px 12px",borderRadius:8,border:"none",background:project.color,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>＋</button>
              </div>
            </div>
            <div style={{borderTop:"1px solid #ECECEC",padding:"12px 16px 16px"}}>
              <div style={{fontSize:10,color:"#bbb",marginBottom:8,letterSpacing:0.5}}>メモ</div>
              <div style={{display:"flex",gap:8,marginBottom:6}}>
                <textarea placeholder="メモを入力…" value={memoInputs[project.id]||""} rows={2}
                  onChange={e=>setMemoInputs(p=>({...p,[project.id]:e.target.value}))}
                  onKeyDown={e=>e.stopPropagation()}
                  style={{flex:1,padding:"8px 10px",borderRadius:10,border:"1.5px solid #E8E8E8",fontSize:12,outline:"none",resize:"none",lineHeight:1.5}}/>
                <button onClick={()=>addMemo(project.id)} style={{padding:"8px 12px",borderRadius:10,border:"none",background:project.color,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",alignSelf:"flex-end"}}>追加</button>
              </div>
              
              {project.memos.length===0
                ?<div style={{fontSize:12,color:"#ccc",textAlign:"center",padding:"8px 0"}}>まだメモがありません</div>
                :project.memos.map(memo=>(
                  <div key={memo.id} style={{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:6,borderLeft:`3px solid ${project.color}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                      <div style={{fontSize:12,color:"#333",lineHeight:1.6,flex:1,whiteSpace:"pre-wrap"}}>{memo.text}</div>
                      <button onClick={()=>deleteMemo(project.id,memo.id)} style={{background:"none",border:"none",color:"#ddd",fontSize:14,cursor:"pointer"}}>×</button>
                    </div>
                    <div style={{fontSize:10,color:"#bbb",marginTop:4}}>{memo.date}</div>
                  </div>
                ))
              }
            </div>
          </div>
        )}
      </div>
    );
  };

  const todo   = [...projects].filter(p=>getProgress(p.tasks)===0).sort((a,b)=>getDaysLeft(a.deadline)-getDaysLeft(b.deadline));
  const active = [...projects].filter(p=>{const g=getProgress(p.tasks);return g>0&&g<100;}).sort((a,b)=>getDaysLeft(a.deadline)-getDaysLeft(b.deadline));
  const done   = [...projects].filter(p=>getProgress(p.tasks)===100).sort((a,b)=>getDaysLeft(a.deadline)-getDaysLeft(b.deadline));

  return (
    <div style={S.wrap}>
      <div style={S.toastWrap}>
        {toasts.map(t=>(
          <div key={t.id} style={S.toast}>{t.msg}</div>
        ))}
      </div>

      <div style={S.header}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{color:headerSubColor,fontSize:11,letterSpacing:1,marginBottom:2}}>{today}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{color:headerTextColor,fontSize:20,fontWeight:700,letterSpacing:-0.5}}>Creative Board</div>
              <button onClick={()=>setShowColorPicker(p=>!p)} style={{background:headerTextColor==="#1A1A2E"?"rgba(0,0,0,0.1)":"rgba(255,255,255,0.12)",border:"none",borderRadius:8,padding:"4px 8px",cursor:"pointer",fontSize:12,color:headerTextColor}}>🎨</button>
            </div>
            {showColorPicker&&(
              <div style={{marginTop:10,background:headerTextColor==="#1A1A2E"?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",borderRadius:12,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:headerSubColor,marginBottom:8}}>ヘッダーカラー</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                  {["#1A1A2E","#2D2D2D","#1B4332","#1E3A5F","#4A1942","#7B2D00","#1A3A4A","#2C1654"].map(c=>(
                    <div key={c} onClick={()=>setHeaderColor(c)} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:headerColor===c?"3px solid #fff":"3px solid transparent"}}/>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:10,color:headerSubColor}}>カスタム</div>
                  <input type="color" value={headerColor} onChange={e=>setHeaderColor(e.target.value)} style={{width:32,height:28,borderRadius:6,border:"none",cursor:"pointer",padding:0}}/>
                  <div style={{fontSize:11,color:headerTextColor,fontFamily:"monospace"}}>{headerColor}</div>
                  <button onClick={()=>setShowColorPicker(false)} style={{marginLeft:"auto",background:headerTextColor==="#1A1A2E"?"rgba(0,0,0,0.1)":"rgba(255,255,255,0.15)",border:"none",borderRadius:6,padding:"4px 10px",color:headerTextColor,fontSize:11,cursor:"pointer"}}>閉じる</button>
                </div>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8}}>
            {urgentCount>0&&<div style={{background:"#FF4444",color:"#fff",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700}}>⚠ {urgentCount}件緊急</div>}
            <div style={{background:headerTextColor==="#1A1A2E"?"rgba(0,0,0,0.1)":"rgba(255,255,255,0.1)",color:headerTextColor,borderRadius:20,padding:"4px 10px",fontSize:11}}>{projects.length}件稼働中</div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,marginTop:14,alignItems:"center"}}>
          {[{id:"dashboard",label:"案件"},{id:"promotion",label:"発信"},{id:"operation",label:"運営"},{id:"input",label:"インプット"}].map(tab=>(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={S.tab(activeTab===tab.id)}>{tab.label}</button>
          ))}
          {activeTab==="dashboard" && (
            <div style={{display:"flex",gap:2,marginLeft:4,background:"rgba(255,255,255,0.1)",borderRadius:8,padding:2,flexShrink:0}}>
              {[{id:"section",label:"≡"},{id:"active",label:"▶"}].map(col=>(
                <button key={col.id} onClick={()=>setKanbanCol(col.id)} title={col.id==="section"?"セクション":"進行中のみ"}
                  style={{width:24,height:24,borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,transition:"all 0.15s",background:kanbanCol===col.id?"#fff":"transparent",color:kanbanCol===col.id?"#1A1A2E":headerSubColor}}>
                  {col.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* ティッカー */}
      <div style={{background:headerColor,paddingBottom:8,paddingLeft:16,paddingRight:16}}>
        <div style={{background:"rgba(255,255,255,0.08)",borderRadius:20,padding:"5px 14px",display:"flex",alignItems:"center",gap:8,overflow:"hidden"}}>
          <span style={{fontSize:12,flexShrink:0,opacity:0.7}}>{tickerNudge.icon}</span>
          <div key={tickerKey} style={{fontSize:11,color:headerTextColor,opacity:0.85,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",animation:"tickerSlide 8s ease forwards"}}>
            {tickerNudge.text}
          </div>
        </div>
      </div>

      <div style={{padding:"16px 16px 100px"}}>
        {notifPerm!=="granted"&&activeTab==="dashboard"&&(
          <div style={S.notifBanner}>
            <div style={{fontSize:12,color:"#886600"}}>🔔 通知を許可するとリマインドが届きます</div>
            <button onClick={requestNotif} style={{background:"#FFD93D",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>許可する</button>
          </div>
        )}

        {activeTab==="dashboard"&&(
          <div>
            {kanbanCol==="section" ? (
              <div>
                {[
                  {label:"進行中",color:"#4ECDC4",list:active},
                  {label:"未着手",color:"#bbb",list:todo},
                  {label:"完了",color:"#A29BFE",list:done},
                ].map(section=>section.list.length===0?null:(
                  <div key={section.label} style={{marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:section.color}}/>
                      <div style={{fontSize:11,fontWeight:700,color:section.color,letterSpacing:0.5}}>{section.label}</div>
                      <div style={{fontSize:10,color:"#ccc"}}>({section.list.length}件)</div>
                    </div>
                    {section.list.map(p=>renderCard(p))}
                  </div>
                ))}
                {projects.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:"#ccc",fontSize:13}}>案件がありません</div>}
              </div>
            ) : (
              <div>
                {active.length===0
                  ?<div style={{textAlign:"center",padding:"32px 0",color:"#ccc",fontSize:13}}>進行中の案件はありません</div>
                  :active.map(p=>renderCard(p))
                }
              </div>
            )}

            {!showAdd ? (
              <button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:"14px",borderRadius:16,border:"2px dashed #DDD",background:"transparent",color:"#AAA",fontSize:13,cursor:"pointer",marginTop:8}}>＋ 新しい案件を追加</button>
            ) : (
              <div style={{background:"#fff",borderRadius:16,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:12,color:"#1A1A2E"}}>新規案件</div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:10,color:"#999",marginBottom:6}}>キャラクター絵文字</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {PROJECT_EMOJIS.map(e=>(
                      <button key={e} onClick={()=>setNewP(p=>({...p,emoji:e}))} style={{width:36,height:36,borderRadius:10,border:"none",fontSize:20,cursor:"pointer",background:newP.emoji===e?"#1A1A2E":"#F5F5F5",transform:newP.emoji===e?"scale(1.15)":"scale(1)",transition:"all 0.15s"}}>{e}</button>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:"#999",marginBottom:4}}>案件名 *</div>
                  <input type="text" placeholder="案件名 *" value={newP.title} onChange={e=>setNewP(p=>({...p,title:e.target.value}))} style={S.input}/>
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:"#999",marginBottom:4}}>タグ</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                    {(newP.tags||[]).map((tag,i)=>(
                      <span key={i} style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:["#FF6B6B22","#4ECDC422","#A29BFE22","#FFD93D22","#F8A5C222","#74B9FF22"][i%6],color:["#FF6B6B","#4ECDC4","#A29BFE","#CC9900","#D4608A","#2980B9"][i%6],fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                        {tag}
                        <span onClick={()=>setNewP(p=>({...p,tags:p.tags.filter((_,j)=>j!==i)}))} style={{cursor:"pointer",opacity:0.6}}>×</span>
                      </span>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <input type="text" placeholder="タグを入力してEnter" value={tagInput}
                      onChange={e=>setTagInput(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter"&&tagInput.trim()){e.preventDefault();setNewP(p=>({...p,tags:[...(p.tags||[]),tagInput.trim()]}));setTagInput("");}}}
                      style={{...S.input}}/>
                    <button onClick={()=>{if(tagInput.trim()){setNewP(p=>({...p,tags:[...(p.tags||[]),tagInput.trim()]}));setTagInput("");}}} style={{padding:"0 12px",borderRadius:8,border:"none",background:"#1A1A2E",color:"#fff",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>追加</button>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:"#999",marginBottom:4}}>開始日</div>
                    <input type="date" value={newP.startDate} onChange={e=>setNewP(p=>({...p,startDate:e.target.value}))} style={{...S.input,color:newP.startDate?"#333":"#aaa"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:"#999",marginBottom:4}}>締め切り日 *</div>
                    <input type="date" value={newP.endDate} onChange={e=>setNewP(p=>({...p,endDate:e.target.value}))} style={{...S.input,color:newP.endDate?"#333":"#aaa",borderColor:newP.endDate?"#A29BFE66":"#E0E0E0"}}/>
                  </div>
                </div>
                {newP.endDate&&(
                  <div style={{background:"#F5F3FF",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:11,color:"#6C5CE7",display:"flex",alignItems:"center",gap:6}}>
                    <span>📅</span>
                    <span>{newP.startDate?`期間：${Math.ceil((new Date(newP.endDate)-new Date(newP.startDate))/86400000)}日間 / 締め切りまで残り${Math.ceil((new Date(newP.endDate)-new Date())/86400000)}日`:`締め切りまで残り${Math.ceil((new Date(newP.endDate)-new Date())/86400000)}日`}</span>
                  </div>
                )}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setShowAdd(false);setNewP({title:"",client:"",startDate:"",endDate:"",emoji:"🎨",tags:[]});
    setTagInput("");}} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #EEE",background:"#fff",color:"#999",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={addProject} style={{flex:2,padding:"10px",borderRadius:10,border:"none",background:"#1A1A2E",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>追加する</button>
                </div>
              </div>
            )}
          </div>
        )}

        {activeTab==="promotion"&&(
          <div>
            <div style={{fontSize:11,color:"#999",marginBottom:10,letterSpacing:0.5}}>マイリンク</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {myLinks.map(link=>(
                <div key={link.id} style={{position:"relative"}}>
                  <a href={link.url} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
                    <div style={{background:"#fff",borderRadius:14,padding:"14px 12px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",borderLeft:`4px solid ${link.color}`,cursor:"pointer"}}>
                      <div style={{width:34,height:34,borderRadius:10,background:link.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{link.icon}</div>
                      <div style={{overflow:"hidden"}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#1A1A2E",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{link.label}</div>
                        <div style={{fontSize:9,color:"#bbb",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{link.url.replace(/^https?:\/\//,"").split("/")[0]}</div>
                      </div>
                    </div>
                  </a>
                  <button onClick={()=>setMyLinks(p=>p.filter(l=>l.id!==link.id))} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.08)",border:"none",borderRadius:"50%",width:18,height:18,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#999"}}>×</button>
                </div>
              ))}
              <button onClick={()=>setShowAddLink(true)} style={{background:"transparent",border:"2px dashed #DDD",borderRadius:14,padding:"14px 12px",color:"#CCC",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,minHeight:66}}>
                <span style={{fontSize:18}}>＋</span> 追加
              </button>
            </div>
            {showAddLink&&(
              <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:16,boxShadow:"0 4px 20px rgba(0,0,0,0.1)",border:"1.5px solid #EEE"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1A1A2E",marginBottom:12}}>リンクを追加</div>
                {[{key:"label",placeholder:"サービス名"},{key:"url",placeholder:"https://..."},{key:"icon",placeholder:"絵文字（例：🎥）"}].map(f=>(
                  <div key={f.key} style={{marginBottom:10}}>
                    <input type="text" placeholder={f.placeholder} value={newLink[f.key]} onChange={e=>setNewLink(p=>({...p,[f.key]:e.target.value}))} style={S.input}/>
                  </div>
                ))}
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                  {["#1A1A1A","#E1306C","#FF7B39","#4A90D9","#00C96B","#A29BFE","#FF6B6B","#FFD93D"].map(c=>(
                    <div key={c} onClick={()=>setNewLink(p=>({...p,color:c}))} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:newLink.color===c?"3px solid #333":"3px solid transparent"}}/>
                  ))}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setShowAddLink(false);setNewLink({label:"",url:"",icon:"🔗",color:"#888"});}} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #EEE",background:"#fff",color:"#999",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={()=>{if(!newLink.label||!newLink.url)return;const url=newLink.url.startsWith("http")?newLink.url:"https://"+newLink.url;setMyLinks(p=>[...p,{id:Date.now(),label:newLink.label,url,icon:newLink.icon||"🔗",color:newLink.color}]);setShowAddLink(false);setNewLink({label:"",url:"",icon:"🔗",color:"#888"});}} style={{flex:2,padding:"10px",borderRadius:10,border:"none",background:"#1A1A2E",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>追加する</button>
                </div>
              </div>
            )}
            <div style={{fontSize:11,color:"#999",marginBottom:10,letterSpacing:0.5}}>発信タスク</div>
            {promotion.map(task=>(
              <div key={task.id} style={{background:"#fff",borderRadius:14,marginBottom:8,boxShadow:"0 2px 8px rgba(0,0,0,0.04)",overflow:"hidden"}}>
                {editPromotion&&editPromotion.id===task.id ? (
                  <div style={{padding:"12px 14px"}}>
                    <input type="text" value={editPromotion.label} onChange={e=>setEditPromotion(p=>({...p,label:e.target.value}))} style={{...S.input,border:"1.5px solid #A29BFE",marginBottom:8}}/>
                    <input type="date" value={/^\d{4}/.test(editPromotion.due)?editPromotion.due:""} onChange={e=>setEditPromotion(p=>({...p,due:e.target.value}))} style={{...S.input,marginBottom:6}}/>
                    <div style={{display:"flex",gap:5,marginBottom:10}}>
                      {["今日","今週","来週"].map(d=>(
                        <button key={d} onClick={()=>setEditPromotion(p=>({...p,due:d}))} style={{flex:1,padding:"5px",borderRadius:7,border:"none",fontSize:11,cursor:"pointer",background:editPromotion.due===d?"#A29BFE":"#F0F0F0",color:editPromotion.due===d?"#fff":"#999",fontWeight:editPromotion.due===d?700:400}}>{d}</button>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setEditPromotion(null)} style={{flex:1,padding:"8px",borderRadius:8,border:"1.5px solid #EEE",background:"#fff",color:"#999",fontSize:12,cursor:"pointer"}}>キャンセル</button>
                      <button onClick={()=>updatePromotionTask(task.id,editPromotion.label,editPromotion.due)} style={{flex:2,padding:"8px",borderRadius:8,border:"none",background:"#A29BFE",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>保存</button>
                    </div>
                  </div>
                ) : (
                  <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,opacity:task.done?0.5:1}}>
                    <div onClick={()=>setPromotion(p=>p.map(t=>t.id===task.id?{...t,done:!t.done}:t))} style={{width:22,height:22,borderRadius:8,flexShrink:0,border:task.done?"none":"2px solid #A29BFE",background:task.done?"#A29BFE":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                      {task.done&&<span style={{color:"#fff",fontSize:12}}>✓</span>}
                    </div>
                    <div onClick={()=>setPromotion(p=>p.map(t=>t.id===task.id?{...t,done:!t.done}:t))} style={{flex:1,fontSize:13,color:"#1A1A2E",textDecoration:task.done?"line-through":"none",cursor:"pointer"}}>{task.label}</div>
                    <div style={{fontSize:10,color:"#FF6B6B",fontWeight:600}}>{fmtDue(task.due)}</div>
                    <button onClick={()=>setEditPromotion({id:task.id,label:task.label,due:task.due})} style={{background:"none",border:"none",color:"#ccc",fontSize:13,cursor:"pointer",padding:"0 2px"}}>✏️</button>
                    <button onClick={()=>deletePromotionTask(task.id)} style={{background:"none",border:"none",color:"#ddd",fontSize:15,cursor:"pointer",padding:0,lineHeight:1}}>×</button>
                  </div>
                )}
              </div>
            ))}
            {!showAddPromotion ? (
              <button onClick={()=>setShowAddPromotion(true)} style={{width:"100%",padding:"14px",borderRadius:14,border:"2px dashed #DDD",background:"transparent",color:"#AAA",fontSize:13,cursor:"pointer",marginTop:4}}>＋ 発信タスクを追加</button>
            ) : (
              <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <input type="text" placeholder="タスク名を入力…" value={newPromotion.label} onChange={e=>setNewPromotion(p=>({...p,label:e.target.value}))} style={{...S.input,marginBottom:10}}/>
                <input type="date" value={/^\d{4}/.test(newPromotion.due)?newPromotion.due:""} onChange={e=>setNewPromotion(p=>({...p,due:e.target.value}))} style={{...S.input,marginBottom:6}}/>
                <div style={{display:"flex",gap:5,marginBottom:10}}>
                  {["今日","今週","来週"].map(d=>(
                    <button key={d} onClick={()=>setNewPromotion(p=>({...p,due:d}))} style={{flex:1,padding:"6px",borderRadius:7,border:"none",fontSize:11,cursor:"pointer",background:newPromotion.due===d?"#A29BFE":"#F0F0F0",color:newPromotion.due===d?"#fff":"#999",fontWeight:newPromotion.due===d?700:400}}>{d}</button>
                  ))}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{setShowAddPromotion(false);setNewPromotion({label:"",due:"今日"});}} style={{flex:1,padding:"9px",borderRadius:10,border:"1.5px solid #EEE",background:"#fff",color:"#999",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={()=>{addPromotionTask(newPromotion.label,newPromotion.due);setNewPromotion({label:"",due:"今日"});setShowAddPromotion(false);}} style={{flex:2,padding:"9px",borderRadius:10,border:"none",background:"#A29BFE",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>追加する</button>
                </div>
              </div>
            )}
          </div>
        )}

        {activeTab==="operation"&&(
          <div>
            <div style={{fontSize:11,color:"#999",marginBottom:12,letterSpacing:0.5}}>運営タスク</div>
            {operations.map(task=>{
              const repeatLabel = {none:"繰り返しなし",daily:"毎日",weekly:"毎週",monthly:"毎月"}[task.repeat];
              return (
                <div key={task.id} style={{background:"#fff",borderRadius:14,marginBottom:8,boxShadow:"0 2px 8px rgba(0,0,0,0.04)",overflow:"hidden"}}>
                  {editOpId===task.id ? (
                    <div style={{padding:"12px 14px"}}>
                      <input type="text" defaultValue={task.label} id={`op-${task.id}`} style={{...S.input,border:"1.5px solid #4ECDC4",marginBottom:8}}/>
                      <div style={{marginBottom:8}}>
                        <div style={{fontSize:10,color:"#999",marginBottom:5}}>繰り返し</div>
                        <div style={{display:"flex",gap:5}}>
                          {[{v:"none",l:"なし"},{v:"daily",l:"毎日"},{v:"weekly",l:"毎週"},{v:"monthly",l:"毎月"}].map(r=>(
                            <button key={r.v} onClick={()=>setOperations(prev=>prev.map(t=>t.id!==task.id?t:{...t,repeat:r.v}))} style={{flex:1,padding:"5px",borderRadius:7,border:"none",fontSize:11,cursor:"pointer",background:task.repeat===r.v?"#4ECDC4":"#F0F0F0",color:task.repeat===r.v?"#fff":"#999",fontWeight:task.repeat===r.v?700:400}}>{r.l}</button>
                          ))}
                        </div>
                      </div>
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:10,color:"#999",marginBottom:5}}>通知日時</div>
                        <input type="datetime-local" defaultValue={task.notify} id={`op-notify-${task.id}`} style={S.input}/>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setEditOpId(null)} style={{flex:1,padding:"8px",borderRadius:8,border:"1.5px solid #EEE",background:"#fff",color:"#999",fontSize:12,cursor:"pointer"}}>キャンセル</button>
                        <button onClick={()=>{const label=document.getElementById(`op-${task.id}`).value;const notify=document.getElementById(`op-notify-${task.id}`).value;setOperations(prev=>prev.map(t=>t.id!==task.id?t:{...t,label,notify}));setEditOpId(null);}} style={{flex:2,padding:"8px",borderRadius:8,border:"none",background:"#4ECDC4",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>保存</button>
                      </div>
                    </div>
                  ) : (
                    <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,opacity:task.done?0.5:1}}>
                      <div onClick={()=>toggleOperation(task.id)} style={{width:22,height:22,borderRadius:8,flexShrink:0,border:task.done?"none":"2px solid #4ECDC4",background:task.done?"#4ECDC4":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                        {task.done&&<span style={{color:"#fff",fontSize:12}}>✓</span>}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:"#1A1A2E",textDecoration:task.done?"line-through":"none",cursor:"pointer"}} onClick={()=>toggleOperation(task.id)}>{task.label}</div>
                        <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
                          {task.repeat!=="none"&&<span style={{fontSize:9,color:"#4ECDC4",background:"#F0FFFD",borderRadius:4,padding:"1px 6px",fontWeight:600}}>🔄 {repeatLabel}</span>}
                          {task.notify&&<span style={{fontSize:9,color:"#FF9500",background:"#FFFBF0",borderRadius:4,padding:"1px 6px"}}>🔔 {fmtDt(task.notify)}</span>}
                        </div>
                      </div>
                      <button onClick={()=>setEditOpId(task.id)} style={{background:"none",border:"none",color:"#ccc",fontSize:13,cursor:"pointer",padding:"0 2px"}}>✏️</button>
                      <button onClick={()=>deleteOperation(task.id)} style={{background:"none",border:"none",color:"#ddd",fontSize:15,cursor:"pointer",padding:0}}>×</button>
                    </div>
                  )}
                </div>
              );
            })}
            {!showAddOp ? (
              <button onClick={()=>setShowAddOp(true)} style={{width:"100%",padding:"14px",borderRadius:14,border:"2px dashed #DDD",background:"transparent",color:"#AAA",fontSize:13,cursor:"pointer",marginTop:4}}>＋ 運営タスクを追加</button>
            ) : (
              <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <input type="text" placeholder="タスク名を入力…" value={newOp.label} onChange={e=>setNewOp(p=>({...p,label:e.target.value}))} style={{...S.input,marginBottom:10}}/>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:"#999",marginBottom:5}}>繰り返し</div>
                  <div style={{display:"flex",gap:5}}>
                    {[{v:"none",l:"なし"},{v:"daily",l:"毎日"},{v:"weekly",l:"毎週"},{v:"monthly",l:"毎月"}].map(r=>(
                      <button key={r.v} onClick={()=>setNewOp(p=>({...p,repeat:r.v}))} style={{flex:1,padding:"6px",borderRadius:7,border:"none",fontSize:11,cursor:"pointer",background:newOp.repeat===r.v?"#4ECDC4":"#F0F0F0",color:newOp.repeat===r.v?"#fff":"#999",fontWeight:newOp.repeat===r.v?700:400}}>{r.l}</button>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:"#999",marginBottom:5}}>通知日時（任意）</div>
                  <input type="datetime-local" value={newOp.notify} onChange={e=>setNewOp(p=>({...p,notify:e.target.value}))} style={S.input}/>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{setShowAddOp(false);setNewOp({label:"",repeat:"none",notify:""}); }} style={{flex:1,padding:"9px",borderRadius:10,border:"1.5px solid #EEE",background:"#fff",color:"#999",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={addOperation} style={{flex:2,padding:"9px",borderRadius:10,border:"none",background:"#4ECDC4",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>追加する</button>
                </div>
              </div>
            )}
          </div>
        )}

        {activeTab==="input"&&(
          <div>
            <div style={{fontSize:11,color:"#999",marginBottom:16}}>今日のクリエイティブ声掛け</div>
            <div style={{background:"#1A1A2E",borderRadius:20,padding:"24px 20px",marginBottom:16,textAlign:"center",opacity:nudgeVisible?1:0,transition:"opacity 0.2s"}}>
              <div style={{fontSize:40,marginBottom:12}}>{nudge.icon}</div>
              <div style={{color:"#fff",fontSize:16,fontWeight:600,lineHeight:1.6,marginBottom:20}}>{nudge.text}</div>
              <button onClick={()=>{setNudgeVisible(false);setTimeout(()=>{setNudge(NUDGES[Math.floor(Math.random()*NUDGES.length)]);setNudgeVisible(true);},200);}} style={{padding:"10px 24px",borderRadius:30,border:"1.5px solid rgba(255,255,255,0.2)",background:"transparent",color:"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer"}}>別のを見る</button>
            </div>
            <div style={{fontSize:11,color:"#999",marginBottom:12}}>インプット活動リスト</div>
            {NUDGES.map((n,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                <span style={{fontSize:20}}>{n.icon}</span>
                <span style={{fontSize:13,color:"#333",lineHeight:1.4}}>{n.text}</span>
              </div>
            ))}
            <button style={{width:"100%",padding:"14px",borderRadius:14,border:"2px dashed #DDD",background:"transparent",color:"#AAA",fontSize:13,cursor:"pointer",marginTop:4}}>＋ 声掛けをカスタム追加</button>
          </div>
        )}
      </div>

      <div style={S.footer}>
        <span>Creative Board — v0.56</span>
        <button onClick={()=>{if(window.confirm("データをリセットしますか？")){localStorage.clear();window.location.reload();}}} style={{marginLeft:12,background:"none",border:"none",color:"#CCC",fontSize:10,cursor:"pointer",textDecoration:"underline"}}>リセット</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
